# OBSEA Gap Filling Pipeline - VARMA Configuration

model:
  name: "VARMA"
  p: 2          # AR order
  q: 0          # MA order (0 for VAR)
  hidden_dim: 64

training:
  batch_size: 128
  epochs: 50
  learning_rate: 0.001
  early_stopping_patience: 10

hardware:
  device: "cuda"  # "cuda" or "cpu"
  num_workers: 0

output:
  model_dir: "results/models/varma"
  metrics_dir: "results/metrics/varma"
