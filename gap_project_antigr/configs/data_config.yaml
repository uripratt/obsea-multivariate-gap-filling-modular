# OBSEA Gap Filling Pipeline - Data Configuration

# Data paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  simulated_gaps_dir: "data/simulated_gaps"
  
  # Primary dataset
  raw_file: "OBSEA_CTD_multivar_QC_minimal_small_interpolated.csv"
  
  # Processed outputs
  preprocessed_file: "obsea_preprocessed.csv"
  train_file: "obsea_train.csv"
  val_file: "obsea_val.csv"
  test_file: "obsea_test.csv"

# Variables
variables:
  # Target variable for imputation
  target: "TEMP"
  
  # All available variables
  all_vars:
    - "TEMP"
    - "PSAL"
    - "SVEL"
    - "PRES"
    - "TEMP_STD"
  
  # QC flag columns
  qc_columns:
    - "TEMP_QC"
    - "PSAL_QC"
    - "SVEL_QC"
    - "PRES_QC"
    - "TEMP_STD_QC"
    - "QC_TEMP_INTERP"
  
  # Auxiliary columns
  aux_columns:
    - "interpolated"

# Preprocessing
preprocessing:
  # QC flag handling (0 = good, 9 = missing)
  qc_good_flags: [0]
  qc_bad_flags: [9]
  
  # Outlier detection
  outlier_method: "zscore"  # "zscore" or "iqr"
  outlier_threshold: 3.0
  
  # Normalization
  normalization: "standard"  # "standard", "minmax", or "robust"
  
  # Minimum data quality
  min_valid_fraction: 0.6  # Require at least 60% valid data in training period

# Temporal splitting
temporal_split:
  # Split ratios (must sum to 1.0)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  
  # Alternative: specify exact dates
  use_date_split: false
  train_end: "2015-12-31"
  val_end: "2018-12-31"
  
# Time series properties
timeseries:
  datetime_column: null  # First column (index)
  freq: "30min"  # Measurement frequency
  
# Random seed for reproducibility
random_seed: 42
