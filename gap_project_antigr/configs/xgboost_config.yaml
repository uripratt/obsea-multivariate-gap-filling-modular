# XGBoost Configuration

# Model parameters
model:
  # XGBoost hyperparameters
  n_estimators: 500
  max_depth: 7
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  
  # Other settings
  random_state: 42
  n_jobs: -1
  tree_method: "hist"  # "hist" is faster
  early_stopping_rounds: 50

# Features
features:
  # Lag features (in hours)
  lags: [1, 2, 6, 12, 24, 48, 168]  # 1h, 2h, 6h, 12h, 1d, 2d, 1w
  
  # Rolling window statistics (in hours)
  rolling_windows: [6, 24, 168]  # 6h, 1d, 1w
  rolling_stats: ["mean", "std", "min", "max"]
  
  # Temporal features
  temporal:
    - "hour_of_day"
    - "day_of_week"
    - "day_of_year"
    - "month"
    - "season"
    - "hour_sin"
    - "hour_cos"
    - "month_sin"
    - "month_cos"
  
  # Use other variables as features
  use_multivariate: true
  multivariate_vars: ["PSAL", "SVEL", "PRES"]
  
  # Time since last observation
  time_since_obs: true

# Training
training:
  # Validation strategy
  validation_strategy: "holdout"  # "holdout" or "timeseries_cv"
  
  # For time series CV
  n_splits: 5
  test_size_days: 30
  
  # Optimization
  optimize_hyperparams: false  # Set to true to use Optuna
  optimization_trials: 50

# Imputation strategy
imputation:
  # For multivariate case
  strategy: "iterative"  # "direct" or "iterative"
  max_iter: 10
  tolerance: 0.001

# Output
output:
  model_dir: "results/models/xgboost"
  prediction_dir: "results/predictions/xgboost"
  feature_importance_plot: "results/figures/xgboost_feature_importance.png"
