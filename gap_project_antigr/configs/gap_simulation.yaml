# Gap Simulation Configuration

# Random seed
random_seed: 42

# Gap patterns to simulate
gap_patterns:
  # Pattern 1: Random short gaps
  - name: "random_short"
    type: "random"
    num_gaps: 100
    min_length: "1h"
    max_length: "6h"
    target_vars: ["TEMP"]
  
  # Pattern 2: Random medium gaps
  - name: "random_medium"
    type: "random"
    num_gaps: 50
    min_length: "12h"
    max_length: "3d"
    target_vars: ["TEMP"]
  
  # Pattern 3: Random long gaps
  - name: "random_long"
    type: "random"
    num_gaps: 20
    min_length: "5d"
    max_length: "14d"
    target_vars: ["TEMP"]
  
  # Pattern 4: Clustered gaps (realistic sensor failure)
  - name: "clustered"
    type: "clustered"
    num_clusters: 10
    gaps_per_cluster: 5
    min_length: "2h"
    max_length: "12h"
    cluster_spread: "7d"
    target_vars: ["TEMP"]
  
  # Pattern 5: Multivariate gaps (multiple sensors fail together)
  - name: "multivariate"
    type: "random"
    num_gaps: 30
    min_length: "1d"
    max_length: "5d"
    target_vars: ["TEMP", "PSAL", "SVEL"]

# Gap simulation strategy
simulation:
  # Only simulate gaps in validation/test sets (preserve real training data)
  simulate_in_train: false
  simulate_in_val: true
  simulate_in_test: true
  
  # Minimum distance between gaps
  min_gap_distance: "24h"
  
  # Only create gaps where data exists (don't mask already missing data)
  only_mask_existing: true
  
  # Save ground truth
  save_ground_truth: true
  
  # Output directory
  output_dir: "data/simulated_gaps"
