# TCN (Temporal Convolutional Network) Configuration

# Model architecture
model:
  # TCN parameters
  num_channels: [64, 128, 128, 64]  # Channel progression through layers
  kernel_size: 3
  dropout: 0.2
  
  # Dilations (auto-computed if null)
  dilations: null  # Will use exponential: [1, 2, 4, 8, ...]
  
  # Residual connections
  use_residual: true
  
  # Input/output
  input_size: 5  # Will be set based on data
  output_size: 1
  
  # Receptive field (auto-computed from dilations)
  target_receptive_field: 48  # In time steps

# Training
training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.002
  weight_decay: 1e-5
  
  # Optimizer
  optimizer: "adam"
  
  # Learning rate scheduler
  scheduler: "cosine"  # "cosine", "step", or "reduce_on_plateau"
  scheduler_warmup_epochs: 10
  
  # Early stopping
  early_stopping: true
  patience: 20
  min_delta: 1e-4
  
  # Gradient clipping
  grad_clip: 1.0

# Data
data:
  # Sequence length
  sequence_length: 96  # 96 * 30min = 48 hours
  
  # Validation split
  val_split: 0.15
  
  # Normalization
  normalization: "global"
  
  # Missing value handling
  missing_handling: "mask"

# Hardware
hardware:
  device: "cpu"  # "cuda" or "cpu" - use cpu to avoid GPU issues
  num_workers: 4
  pin_memory: false

# Output
output:
  model_dir: "results/models/tcn"
  prediction_dir: "results/predictions/tcn"
  checkpoint_dir: "results/models/tcn/checkpoints"
  log_dir: "results/models/tcn/logs"
  
  save_best_only: true
  monitor_metric: "val_loss"
  log_interval: 10

# Random seed
random_seed: 42
