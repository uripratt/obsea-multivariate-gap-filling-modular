# LSTM Configuration

# Model architecture
model:
  # LSTM layers
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: true
  
  # Input/output
  input_features: 5  # Will be set based on data
  output_size: 1
  
  # Sequence length
  sequence_length: 48  # 48 * 30min = 24 hours
  
  # Attention mechanism
  use_attention: false

# Training
training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  weight_decay: 1e-5
  
  # Optimizer
  optimizer: "adam"  # "adam" or "adamw"
  
  # Learning rate scheduler
  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5
  
  # Early stopping
  early_stopping: true
  patience: 20
  min_delta: 1e-4
  
  # Gradient clipping
  grad_clip: 1.0

# Data
data:
  # Validation split
  val_split: 0.15
  
  # Normalization (per sequence or global)
  normalization: "global"  # "global" or "per_sequence"
  
  # Handle missing values in sequences
  missing_handling: "mask"  # "mask", "forward_fill", or "drop"
  
  # Data augmentation
  use_augmentation: false
  noise_level: 0.01

# Hardware
hardware:
  device: "cpu"  # "cuda" or "cpu" - use cpu to avoid GPU issues
  num_workers: 4
  pin_memory: false  # Only useful with cuda

# Output
output:
  model_dir: "results/models/lstm"
  prediction_dir: "results/predictions/lstm"
  checkpoint_dir: "results/models/lstm/checkpoints"
  log_dir: "results/models/lstm/logs"
  
  # Save best model
  save_best_only: true
  monitor_metric: "val_loss"
  
  # Logging
  log_interval: 10  # Log every N batches

# Random seed
random_seed: 42
